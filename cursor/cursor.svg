<svg xmlns="http://www.w3.org/2000/svg" style="position:absolute;width:0;height:0;overflow:hidden" aria-hidden="true" focusable="false">
  <defs>
    <!-- ============================================================
         Shared gradients
         ============================================================ -->
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D8A3B"/>
      <stop offset="55%" stop-color="#2DBE4F"/>
      <stop offset="100%" stop-color="#9AE600"/>
    </linearGradient>

    <linearGradient id="leafGradSoft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D8A3B" stop-opacity="0.85"/>
      <stop offset="55%" stop-color="#2DBE4F" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#9AE600" stop-opacity="0.85"/>
    </linearGradient>

    <linearGradient id="windGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9AE600" stop-opacity="0"/>
      <stop offset="45%" stop-color="#2DBE4F" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.85"/>
    </linearGradient>

    <radialGradient id="glossHighlight" cx="35%" cy="25%" r="65%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- Outer glow is applied via CSS drop-shadow() instead of a custom
         SVG filter chain here. An earlier version combined outer-glow +
         inner-shadow into one hand-built filter (feComponentTransfer /
         feComposite chaining) -- that primitive combo isn't consistently
         supported and rendered as a solid black box in some browsers
         instead of failing gracefully. drop-shadow() gives the same
         soft-glow look with near-universal support and no custom
         filter graph to go wrong. The "inner shadow" look is instead
         baked into each symbol as a static inset stroke (see leaf-outline
         below), which always renders identically everywhere. -->

    <!-- Reusable leaflet primitive -- every glyph in the set is composed
         from copies of this one shape so the whole icon family reads as
         one consistent visual language. -->
    <path id="petal" d="M0,-8 C4,-7 6,-3 5.5,1 C5,5 2.5,7.5 0,8 C-2.5,7.5 -5,5 -5.5,1 C-6,-3 -4,-7 0,-8 Z"/>

    <!-- ============================================================
         Main cursor body -- organic arrow/leaf hybrid
         ============================================================ -->
    <symbol id="leaf-default" viewBox="0 0 40 40">
      <path class="leaf-outline" fill="url(#leafGrad)" stroke="#04350f" stroke-opacity="0.28" stroke-width="0.8"
        d="M9,5 C7,4 5,5 5,7 L5,33 C5,36 8,37.5 10.3,35.7 L15.5,31.7 L19,39
           C19.9,41 22.3,41.6 23.9,40.2 C25.3,39 25.6,36.9 24.7,35.3 L21,28
           L29,26.6 C31.7,26.1 32.3,22.5 30,21 L11,5.8 C10.4,5.3 9.7,5 9,5 Z"/>
      <!-- gloss highlight -->
      <path fill="url(#glossHighlight)"
        d="M8,7 C9,10 8,16 7,20 C9,17 11,12 10,8 C9.6,7.3 8.6,7 8,7 Z"/>
      <!-- veins -->
      <path fill="none" stroke="#04350f" stroke-opacity="0.32" stroke-width="0.9" stroke-linecap="round"
        d="M9,8 C10,14 12,20 15,26 C16.5,29 18,33 19.5,37"/>
      <path fill="none" stroke="#04350f" stroke-opacity="0.28" stroke-width="0.7" stroke-linecap="round"
        d="M12,14 L8,17 M14,20 L19,22 M16,26 L12,29"/>
      <!-- accent leaflets -->
      <use href="#petal" transform="translate(25,31) rotate(24) scale(0.55)" fill="url(#leafGrad)"/>
      <use href="#petal" transform="translate(29,25) rotate(-18) scale(0.4)" fill="url(#leafGrad)"/>
    </symbol>

    <!-- ============================================================
         Text / I-beam
         ============================================================ -->
    <symbol id="leaf-text" viewBox="0 0 40 40">
      <line x1="20" y1="10" x2="20" y2="30" stroke="url(#leafGrad)" stroke-width="2.2"/>
      <line x1="15" y1="10" x2="25" y2="10" stroke="url(#leafGrad)" stroke-width="2.2" stroke-linecap="round"/>
      <line x1="15" y1="30" x2="25" y2="30" stroke="url(#leafGrad)" stroke-width="2.2" stroke-linecap="round"/>
      <use href="#petal" transform="translate(20,8) scale(0.5)" fill="url(#leafGrad)"/>
      <use href="#petal" transform="translate(20,32) rotate(180) scale(0.5)" fill="url(#leafGrad)"/>
    </symbol>

    <!-- ============================================================
         Grab / Grabbing
         ============================================================ -->
    <symbol id="leaf-grab" viewBox="0 0 40 40">
      <path fill="url(#leafGrad)" d="M12,22 C12,18 15,16 20,16 C25,16 28,18 28,22 L28,28
        C28,32.5 24.5,35 20,35 C15.5,35 12,32.5 12,28 Z"/>
      <use href="#petal" transform="translate(13,14) rotate(-25) scale(0.55)" fill="url(#leafGrad)"/>
      <use href="#petal" transform="translate(17,10) rotate(-10) scale(0.6)" fill="url(#leafGrad)"/>
      <use href="#petal" transform="translate(23,10) rotate(10) scale(0.6)" fill="url(#leafGrad)"/>
      <use href="#petal" transform="translate(27,14) rotate(25) scale(0.55)" fill="url(#leafGrad)"/>
      <path fill="url(#glossHighlight)" d="M14,20 C15,23 14,27 13,29 C15,27 17,23 16,20 Z"/>
    </symbol>

    <symbol id="leaf-grabbing" viewBox="0 0 40 40">
      <path fill="url(#leafGrad)" d="M13,20 C13,16.5 16,15 20,15 C24,15 27,16.5 27,20 L27,29
        C27,33 23.7,35.5 20,35.5 C16.3,35.5 13,33 13,29 Z"/>
      <use href="#petal" transform="translate(15,19) rotate(160) scale(0.4)" fill="url(#leafGrad)"/>
      <use href="#petal" transform="translate(19,17) rotate(170) scale(0.42)" fill="url(#leafGrad)"/>
      <use href="#petal" transform="translate(23,17) rotate(190) scale(0.42)" fill="url(#leafGrad)"/>
      <use href="#petal" transform="translate(27,19) rotate(200) scale(0.4)" fill="url(#leafGrad)"/>
      <path fill="url(#glossHighlight)" d="M15,21 C16,24 15,27 14,29 C16,27 18,24 17,21 Z"/>
    </symbol>

    <!-- ============================================================
         Move (4-direction)
         ============================================================ -->
    <symbol id="leaf-move" viewBox="0 0 40 40">
      <circle cx="20" cy="20" r="3.2" fill="url(#leafGrad)"/>
      <use href="#petal" transform="translate(20,10)" fill="url(#leafGrad)"/>
      <use href="#petal" transform="translate(30,20) rotate(90)" fill="url(#leafGrad)"/>
      <use href="#petal" transform="translate(20,30) rotate(180)" fill="url(#leafGrad)"/>
      <use href="#petal" transform="translate(10,20) rotate(270)" fill="url(#leafGrad)"/>
    </symbol>

    <!-- ============================================================
         Zoom in / out
         ============================================================ -->
    <symbol id="leaf-zoom-in" viewBox="0 0 40 40">
      <circle cx="16" cy="16" r="9" fill="rgba(154,230,0,0.12)" stroke="url(#leafGrad)" stroke-width="3"/>
      <line x1="22.6" y1="22.6" x2="31.5" y2="31.5" stroke="url(#leafGrad)" stroke-width="4" stroke-linecap="round"/>
      <line x1="11" y1="16" x2="21" y2="16" stroke="url(#leafGrad)" stroke-width="2.4" stroke-linecap="round"/>
      <line x1="16" y1="11" x2="16" y2="21" stroke="url(#leafGrad)" stroke-width="2.4" stroke-linecap="round"/>
    </symbol>

    <symbol id="leaf-zoom-out" viewBox="0 0 40 40">
      <circle cx="16" cy="16" r="9" fill="rgba(154,230,0,0.12)" stroke="url(#leafGrad)" stroke-width="3"/>
      <line x1="22.6" y1="22.6" x2="31.5" y2="31.5" stroke="url(#leafGrad)" stroke-width="4" stroke-linecap="round"/>
      <line x1="11" y1="16" x2="21" y2="16" stroke="url(#leafGrad)" stroke-width="2.4" stroke-linecap="round"/>
    </symbol>

    <!-- ============================================================
         Not allowed
         ============================================================ -->
    <symbol id="leaf-not-allowed" viewBox="0 0 40 40">
      <circle cx="20" cy="20" r="12" fill="rgba(154,230,0,0.1)" stroke="url(#leafGrad)" stroke-width="3"/>
      <line x1="11.5" y1="28.5" x2="28.5" y2="11.5" stroke="url(#leafGrad)" stroke-width="3" stroke-linecap="round"/>
    </symbol>

    <!-- ============================================================
         Wait / loading -- radial wreath, spun via CSS
         ============================================================ -->
    <symbol id="leaf-wait" viewBox="0 0 40 40">
      <use href="#petal" transform="translate(20,8) scale(0.5)" fill="url(#leafGrad)" opacity="1"/>
      <use href="#petal" transform="translate(28.5,11.5) rotate(45) scale(0.5)" fill="url(#leafGrad)" opacity="0.9"/>
      <use href="#petal" transform="translate(32,20) rotate(90) scale(0.5)" fill="url(#leafGrad)" opacity="0.8"/>
      <use href="#petal" transform="translate(28.5,28.5) rotate(135) scale(0.5)" fill="url(#leafGrad)" opacity="0.7"/>
      <use href="#petal" transform="translate(20,32) rotate(180) scale(0.5)" fill="url(#leafGrad)" opacity="0.6"/>
      <use href="#petal" transform="translate(11.5,28.5) rotate(225) scale(0.5)" fill="url(#leafGrad)" opacity="0.5"/>
      <use href="#petal" transform="translate(8,20) rotate(270) scale(0.5)" fill="url(#leafGrad)" opacity="0.4"/>
      <use href="#petal" transform="translate(11.5,11.5) rotate(315) scale(0.5)" fill="url(#leafGrad)" opacity="0.35"/>
    </symbol>

    <!-- ============================================================
         Help
         ============================================================ -->
    <symbol id="leaf-help" viewBox="0 0 40 40">
      <use href="#petal" transform="translate(14,22) scale(1.7)" fill="url(#leafGrad)"/>
      <path fill="none" stroke="url(#leafGrad)" stroke-width="3" stroke-linecap="round"
        d="M24,15 C24,11 30,11 30,15 C30,18 26,18 26,21"/>
      <circle cx="26" cy="26" r="1.7" fill="url(#leafGrad)"/>
    </symbol>

    <!-- ============================================================
         Precision
         ============================================================ -->
    <symbol id="leaf-precision" viewBox="0 0 40 40">
      <line x1="20" y1="3" x2="20" y2="13" stroke="url(#leafGrad)" stroke-width="1.6" stroke-opacity="0.6"/>
      <line x1="20" y1="27" x2="20" y2="37" stroke="url(#leafGrad)" stroke-width="1.6" stroke-opacity="0.6"/>
      <line x1="3" y1="20" x2="13" y2="20" stroke="url(#leafGrad)" stroke-width="1.6" stroke-opacity="0.6"/>
      <line x1="27" y1="20" x2="37" y2="20" stroke="url(#leafGrad)" stroke-width="1.6" stroke-opacity="0.6"/>
      <path fill="url(#leafGrad)" d="M20,12 L26,20 L20,28 L14,20 Z"/>
    </symbol>

    <!-- ============================================================
         Resize -- one glyph, rotated via CSS for h/v/diagonal
         ============================================================ -->
    <symbol id="leaf-resize" viewBox="0 0 40 40">
      <line x1="10" y1="20" x2="30" y2="20" stroke="url(#leafGrad)" stroke-width="2.4" stroke-linecap="round"/>
      <use href="#petal" transform="translate(10,20) rotate(270) scale(0.85)" fill="url(#leafGrad)"/>
      <use href="#petal" transform="translate(30,20) rotate(90) scale(0.85)" fill="url(#leafGrad)"/>
    </symbol>

    <!-- ============================================================
         Trail leaf -- simplified geometry for cheap repeated use
         ============================================================ -->
    <symbol id="leaf-trail-item" viewBox="0 0 40 40">
      <path fill="url(#leafGradSoft)"
        d="M20,6 C26,8 32,16 30,24 C28,31 22,36 20,37 C18,36 12,31 10,24 C8,16 14,8 20,6 Z"/>
      <path fill="none" stroke="#04350f" stroke-opacity="0.25" stroke-width="0.8" stroke-linecap="round"
        d="M20,9 L20,34 M20,14 L14,19 M20,14 L26,19 M20,22 L15,27 M20,22 L25,27"/>
    </symbol>
  </defs>
</svg>
